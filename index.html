<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RideTheRoad</title>

  <link rel="stylesheet" href="style.css" />

  <!-- MapLibre -->
  <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
</head>

<body>

  <!-- Barra di ricerca -->
  <div id="search-bar">🔍 Cerca destinazione...</div>

  <!-- Mappa -->
  <div id="map"></div>

  <!-- Overlay navigazione -->
  <div id="nav-instruction">
    <div id="nav-icon">➡️</div>
    <div id="nav-text">Carica un GPX per iniziare</div>
  </div>

  <div id="nav-bottom">
    <span id="nav-distance">-- km</span> •
    <span id="nav-time">-- min</span> •
    <span id="nav-arrival">Arrivo --:--</span>
  </div>

  <!-- Pulsanti flottanti -->
  <div id="compass" class="fab">🧭</div>
  <div id="zoom-in" class="fab">➕</div>
  <div id="zoom-out" class="fab">➖</div>
  <div id="import-gpx" class="fab">📁</div>
  <div id="start-nav" class="fab">▶️</div>

  <!-- Input file invisibile -->
  <input type="file" id="gpx-file" accept=".gpx" style="display:none" />

  <script src="gpx.js"></script>
  <script src="navigation.js"></script>
  <script src="app.js"></script>
</body>
</html>
